name: Build and test libdnf5-plugin-swidtags

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '12 6 4 * *'

jobs:
  build:
    name: Run tests in container
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        os: [ fedora-rawhide ]
    steps:
      - uses: actions/checkout@v2
      - name: Set the right OS in the Dockerfile
        run: sed -i "s#^FROM.*#FROM $( echo ${{ matrix.os }} | sed 's#^fedora-#registry.fedoraproject.org/fedora:#' )#" tests/Dockerfile
      - name: Build image
        run: docker build -t libdnf5-plugin-swidtags -f tests/Dockerfile .
      - name: Run container
        run: docker run --name libdnf5-plugin-swidtags -e FAKECHROOT=fakechroot --rm -d libdnf5-plugin-swidtags sleep 600
      - name: Run tests in the container
        run: docker exec libdnf5-plugin-swidtags make -f Makefile.in swidtags_plugin test
      - name: Install the built rpm
        run: docker exec libdnf5-plugin-swidtags rpm -Uvh libdnf5-plugin-swidtags.rpm
      - name: Prepare test directory for TEST_INSTALLED run
        run: docker exec libdnf5-plugin-swidtags mkdir the-tests
      - name: Prepare test directory for TEST_INSTALLED run
        run: docker exec libdnf5-plugin-swidtags cp -rp Makefile.in test.sh tests the-tests/
      - name: For PackageKit testing, dbus needs to be running
        run: docker exec libdnf5-plugin-swidtags tests/dbus-start
      - name: TEST_INSTALLED=true
        run: docker exec -t libdnf5-plugin-swidtags make -C the-tests -f Makefile.in test TEST_INSTALLED=true
